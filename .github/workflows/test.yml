name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim_version: ["nightly", "stable"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhymond/setup-neovim@v1
        with:
          neovim-version: ${{ matrix.neovim_version }}

      - name: Check Neovim version
        run: nvim --version

      - name: Run tests
        run: |
          chmod +x scripts/test
          ./scripts/test
