name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # leanpack requires Neovim 0.12.0+
        # Once 0.12.0 is released, add 'v0.12.0' to test against stable
        neovim_version: ["nightly"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhymond/setup-neovim@v1
        with:
          neovim-version: ${{ matrix.neovim_version }}

      - name: Check Neovim version
        run: nvim --version

      - name: Run tests
        run: |
          chmod +x scripts/test
          ./scripts/test
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua
